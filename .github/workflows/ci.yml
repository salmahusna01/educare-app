name: CI Pipeline

on:
  push:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Backend
        working-directory: backend
        run: |
          npm install

      - name: Install Frontend
        working-directory: frontend
        run: |
          npm install